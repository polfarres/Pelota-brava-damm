    type: PALLET_FLOOR
    pos_cm: [0, 0, 0]
    size_cm: [120, 80, 180]
    accepts: [EUR_PALLET, INDUSTRIAL_PALLET, BRL, CASE]
    capacity_ce: 60.0
    max_weight_kg: 900
    reachable_from: [LEFT, REAR]
    blocked_by_per_face:
      REAR: [P3, P5, P7]
    can_host_returns_of: [EUR_PALLET, INDUSTRIAL_PALLET, BRL, CASE]
